spring.application.name=lifelink-backend

# --- Data Source Configuration ---
# Placeholders are filled by environment variables
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# --- JPA / Hibernate Configuration ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Use 'update' for v0 development; switch to 'validate' for production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Custom JSON Mapper for dynamicInfo (JSONB)
spring.jpa.properties.hibernate.type.json_format_mapper=com.lifelink.lifelink.backend.config.Jackson3FormatMapper

# --- Liquibase Configuration ---
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# --- Security ---
jwt.secret=${JWT_SECRET}
jwt.expiration=31536000000

# --- Server ---
server.port=${PORT:8080}



